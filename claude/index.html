<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="utf-8">
<title>Tradicijsko pučko crkveno pjevanje — karta mjesta snimanja</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Karta mjesta snimanja tradicijskoga pučkog crkvenog (glagoljaškog) pjevanja.">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gentium+Book+Plus:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#22303a;          /* tamna tinta */
  --ink-soft:#5a6b76;
  --paper:#fbf8f1;        /* arhivski papir */
  --paper-edge:#e7dfcd;
  --sea:#16607a;          /* jadransko modrilo — akcent */
  --sea-deep:#0e4658;
  --warn:#a4543a;         /* opeka — neprovjerene lokacije */
  --shadow:0 10px 30px rgba(20,35,45,.22), 0 2px 6px rgba(20,35,45,.12);
  --radius:10px;
  font-size:15px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;color:var(--ink)}
#map{height:100%;width:100%;background:#cfe0e4}

/* ---------- naslovna pločica ---------- */
.title-card{
  position:absolute;z-index:1000;top:12px;left:12px;max-width:330px;
  background:var(--paper);border:1px solid var(--paper-edge);
  border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 16px 11px;
}
.title-card h1{
  font-family:'Gentium Book Plus',serif;font-weight:700;font-size:1.15rem;
  line-height:1.25;margin:0 0 2px;color:var(--sea-deep);
}
.title-card p{margin:0;font-size:.74rem;color:var(--ink-soft);line-height:1.4}
.title-card .stat{color:var(--sea);font-weight:600}

/* ---------- panel s filterima ---------- */
.filters{
  position:absolute;z-index:1000;top:12px;right:12px;width:308px;
  background:var(--paper);border:1px solid var(--paper-edge);
  border-radius:var(--radius);box-shadow:var(--shadow);
  display:flex;flex-direction:column;max-height:calc(100% - 90px);
}
.filters-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--paper-edge);cursor:pointer;
  user-select:none;
}
.filters-head .t{
  font-family:'Gentium Book Plus',serif;font-weight:700;font-size:1.02rem;color:var(--sea-deep);
}
.filters-head .chev{transition:transform .2s;color:var(--ink-soft);font-size:.8rem}
.filters.closed .chev{transform:rotate(-90deg)}
.filters.closed .filters-body{display:none}
.filters-body{overflow-y:auto;padding:10px 12px 12px}
.filters-body::-webkit-scrollbar{width:8px}
.filters-body::-webkit-scrollbar-thumb{background:var(--paper-edge);border-radius:4px}

.f-row{margin-bottom:10px}
.f-label{
  display:block;font-size:.66rem;letter-spacing:.09em;text-transform:uppercase;
  color:var(--ink-soft);margin:0 0 4px 2px;font-weight:600;
}
.f-select,.f-search{
  width:100%;padding:7px 9px;border:1px solid var(--paper-edge);border-radius:7px;
  background:#fff;font:inherit;font-size:.85rem;color:var(--ink);
}
.f-select:focus,.f-search:focus{outline:2px solid var(--sea);outline-offset:1px;border-color:var(--sea)}

.bulk{display:flex;gap:8px;margin:2px 0 10px}
.bulk button{
  flex:1;border:1px solid var(--paper-edge);background:#fff;border-radius:7px;
  padding:5px 0;font:inherit;font-size:.74rem;color:var(--sea-deep);cursor:pointer;
}
.bulk button:hover{background:var(--sea);color:#fff;border-color:var(--sea)}
.bulk button:focus-visible{outline:2px solid var(--sea);outline-offset:1px}

/* grupe */
.group{border-top:1px dotted var(--paper-edge);padding:6px 0 4px}
.group:first-of-type{border-top:none}
.group-head{display:flex;align-items:center;gap:8px}
.group-head input[type=checkbox]{accent-color:var(--sea);width:15px;height:15px;cursor:pointer;flex:none}
.swatch{width:11px;height:11px;border-radius:50%;flex:none;border:1.5px solid rgba(0,0,0,.25)}
.group-name{
  flex:1;font-size:.85rem;font-weight:600;cursor:pointer;line-height:1.25;
  display:flex;align-items:baseline;gap:6px;
}
.group-count{font-size:.7rem;color:var(--ink-soft);font-weight:500;font-variant-numeric:tabular-nums}
.group-toggle{
  border:none;background:none;cursor:pointer;color:var(--ink-soft);
  font-size:.72rem;padding:2px 4px;flex:none;
}
.group-toggle:focus-visible{outline:2px solid var(--sea)}
.place-list{list-style:none;margin:3px 0 2px;padding:0 0 0 24px;display:none}
.group.open .place-list{display:block}
.place-list li{margin:0}
.place-list a{
  display:flex;align-items:baseline;gap:6px;color:var(--ink);text-decoration:none;
  font-size:.8rem;padding:3px 6px;border-radius:5px;line-height:1.3;
}
.place-list a:hover,.place-list a:focus-visible{background:#fff;color:var(--sea-deep);outline:none}
.place-list .n{font-variant-numeric:tabular-nums;color:var(--ink-soft);font-size:.68rem;margin-left:auto;flex:none}
.place-list .u{color:var(--warn);font-size:.68rem;flex:none}
.empty-note{font-size:.78rem;color:var(--ink-soft);padding:8px 2px;font-style:italic}

/* ---------- legenda ---------- */
.legend{
  position:absolute;z-index:1000;left:12px;bottom:24px;
  background:var(--paper);border:1px solid var(--paper-edge);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:9px 13px;font-size:.72rem;color:var(--ink-soft);max-width:240px;
}
.legend .l-row{display:flex;align-items:center;gap:7px;margin:2px 0}
.legend .dot{width:13px;height:13px;border-radius:50%;background:var(--sea);border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.2);flex:none}
.legend .dot.small{width:9px;height:9px}
.legend .dot.unv{background:var(--paper);border:2px dashed var(--warn)}

/* ---------- markeri ---------- */
.pin{border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.45);width:100%;height:100%}
.pin.unverified{border-style:dashed;border-color:#fff}
.leaflet-tooltip.place-tip{
  background:var(--ink);color:var(--paper);border:none;border-radius:6px;
  font-family:'IBM Plex Sans',sans-serif;font-size:.78rem;padding:3px 9px;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.leaflet-tooltip.place-tip::before{display:none}
.cluster-icon{
  background:rgba(22,96,122,.92);color:#fff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font:600 .8rem 'IBM Plex Sans',sans-serif;border:2.5px solid rgba(251,248,241,.95);
  box-shadow:0 2px 8px rgba(0,0,0,.35);width:100%;height:100%;
}

/* ---------- modal ---------- */
.modal-back{
  position:fixed;inset:0;z-index:2000;background:rgba(25,38,46,.45);
  display:none;align-items:center;justify-content:center;padding:18px;
}
.modal-back.show{display:flex}
.modal{
  background:var(--paper);border-radius:14px;box-shadow:var(--shadow);
  width:min(480px,100%);max-height:84vh;display:flex;flex-direction:column;overflow:hidden;
  border:1px solid var(--paper-edge);
}
.modal-head{padding:18px 22px 10px;border-bottom:1px solid var(--paper-edge);position:relative}
.modal-head h2{font-family:'Gentium Book Plus',serif;font-size:1.45rem;margin:0 0 2px;color:var(--sea-deep);line-height:1.2}
.modal-head .sub{font-size:.8rem;color:var(--ink-soft)}
.modal-close{
  position:absolute;top:12px;right:12px;border:none;background:none;cursor:pointer;
  font-size:1.15rem;color:var(--ink-soft);line-height:1;padding:6px;border-radius:6px;
}
.modal-close:hover{background:var(--paper-edge);color:var(--ink)}
.modal-body{padding:12px 22px 18px;overflow-y:auto}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 10px}
.badge{
  font-size:.68rem;font-weight:600;letter-spacing:.03em;color:var(--sea-deep);
  background:#fff;border:1px solid var(--sea);border-radius:99px;padding:2px 10px;
}
.warn-box{
  font-size:.76rem;color:var(--warn);border:1px dashed var(--warn);border-radius:7px;
  padding:6px 10px;margin:0 0 10px;background:rgba(164,84,58,.05);
}
.note{font-size:.8rem;color:var(--ink-soft);font-style:italic;margin:0 0 10px}
.zapisi-t{font-size:.66rem;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin:0 0 4px}
.zapisi{list-style:none;margin:0;padding:0;font-size:.82rem}
.zapisi li{padding:4px 0;border-top:1px dotted var(--paper-edge);line-height:1.35}
.zapisi li:first-child{border-top:none}
.zapisi .src{color:var(--sea);font-weight:600}
.zapisi li{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.zapisi .lbl{flex:1;min-width:0}
.zapisi .meta{display:block;font-size:.7rem;color:var(--ink-soft);font-style:italic;margin-top:1px}
.listen{
  flex:none;font-size:.72rem;font-weight:600;color:#fff;background:var(--sea);
  border-radius:99px;padding:2px 10px;text-decoration:none;white-space:nowrap;
}
.listen:hover{background:var(--sea-deep)}
.modal-foot-note{font-size:.7rem;color:var(--ink-soft);margin:10px 0 0;line-height:1.4}

/* leaflet kontrole u stilu */
.leaflet-bar a{color:var(--ink)}
.leaflet-control-attribution{font-size:.62rem}
/* zoom + fullscreen ispod naslovne pločice */
.leaflet-top.leaflet-left{top:118px}

@media (max-width:680px){
  .title-card{max-width:calc(100% - 24px);padding:9px 13px}
  .title-card p{display:none}
  .leaflet-top.leaflet-left{top:64px}
  .filters{top:auto;bottom:0;right:0;left:0;width:100%;border-radius:14px 14px 0 0;max-height:55%}
  .filters.closed{max-height:none}
  .legend{display:none}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
}
</style>
</head>

<div id="map"></div>

<div class="title-card">
  <h1>Tradicijsko pučko crkveno pjevanje</h1>
  <p>Mjesta snimanja iz Knjige 1 i 2, Popisnoga lista br. 1 i Popisa 2 · <span class="stat" id="stat-line"></span></p>
</div>

<div class="filters" id="filters">
  <div class="filters-head" id="filters-head" role="button" tabindex="0" aria-expanded="true" aria-controls="filters-body">
    <span class="t">Filteri</span>
    <span class="chev">▼</span>
  </div>
  <div class="filters-body" id="filters-body">
    <div class="f-row">
      <label class="f-label" for="src-select">Izvor</label>
      <select id="src-select" class="f-select">
        <option value="">Svi izvori</option>
        <option value="Knjiga 1">Knjiga 1</option>
        <option value="Knjiga 2">Knjiga 2</option>
        <option value="Popisni list 1">Popisni list br. 1</option>
        <option value="Popis 2">Popis 2</option>

    </div>
    <div class="f-row">

      <input id="search" class="f-search" type="search" placeholder="npr. Vrbnik, Mirlović…" autocomplete="off">
    </div>
    <div class="bulk">
      <button type="button" id="all-on">Prikaži sve</button>
      <button type="button" id="all-off">Sakrij sve</button>
    </div>
    <div id="groups"></div>
  </div>
</div>

<div class="legend">
  <div class="l-row"><span class="dot"></span> mjesto snimanja (boja = područje)</div>
  <div class="l-row"><span class="dot small"></span> veličina = broj zapisa</div>
  <div class="l-row"><span class="dot unv"></span> lokacija neprovjerena (približna)</div>
</div>

<div class="modal-back" id="modal-back" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

      <div class="sub" id="modal-sub"></div>
      <button class="modal-close" id="modal-close" aria-label="Zatvori">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

/* ---------- grupiranje po područjima ---------- */
const GROUPS = [
  ["Otok Krk",                         "#16607a"],
  ["Istra, Primorje, Rab i Cres",      "#4a7fa5"],
  ["Zadarsko područje i Pag",          "#5d8f6e"],
  ["Ravni kotari i Bukovica",          "#8a9a4a"],
  ["Šibensko područje i zagora",       "#b08a2e"],
  ["Splitsko-trogirsko područje",      "#a4543a"],
  ["Poljica i omiško zaleđe",          "#8c5d8f"],
  ["Makarsko primorje",                "#2e8a8a"],
  ["Imotska i Vrgorska krajina",       "#7a5a3a"],
  ["Brač, Hvar i Vis",                 "#3a6ea5"],
  ["Korčula, Pelješac i jug",          "#6a4a8f"],
  ["Neretvanska krajina i Hercegovina","#9a3a4a"],
];
const GROUP_COLOR = Object.fromEntries(GROUPS);

function groupOf(p){
  const r = p.regija || "", o = p.otok || "";
  if (o === "Otok Krk") return "Otok Krk";
  if (r === "Istra" || r === "Primorje" || o === "Otok Rab" || o === "Otok Cres") return "Istra, Primorje, Rab i Cres";
  if (r.startsWith("Zadarsk") || o === "Otok Pag" || r === "Sjeverna Dalmacija" || r === "Sjeverna Dalmacija/Kvarner") return "Zadarsko područje i Pag";
  if (r.includes("Ravni kotari") || r.includes("Bukovica")) return "Ravni kotari i Bukovica";
  if (r.startsWith("Šibensk")) return "Šibensko područje i zagora";
  if (r.startsWith("Splitsko") || r === "Trogirska zagora") return "Splitsko-trogirsko područje";
  if (r.startsWith("Poljica") || r.startsWith("Omiško")) return "Poljica i omiško zaleđe";
  if (r === "Makarsko primorje") return "Makarsko primorje";
  if (r.startsWith("Imotska") || r === "Vrgorska krajina" || r === "Zabiokovlje") return "Imotska i Vrgorska krajina";
  if (r === "Srednjodalmatinski otoci") return "Brač, Hvar i Vis";
  if (r === "Južnodalmatinski otoci" || r === "Južna Dalmacija") return "Korčula, Pelješac i jug";
  return "Neretvanska krajina i Hercegovina";
}

/* ---------- stanje ---------- */
const visibleGroups = new Set(GROUPS.map(g => g[0]));
let srcFilter = "";
let query = "";

/* ---------- karta ---------- */
const map = L.map("map", {minZoom: 7, maxZoom: 18})
  .setView([43.8, 16.3], 8);
L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: "&copy; <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a>"
}).addTo(map);
map.setMaxBounds(L.latLngBounds(L.latLng(41.7, 12.0), L.latLng(46.9, 20.0)));
map.on("drag", () => map.panInsideBounds(map.options.maxBounds, {animate:false}));

/* fullscreen gumb */
const FsControl = L.Control.extend({
  options:{position:"topleft"},
  onAdd(){
    const d = L.DomUtil.create("div","leaflet-bar");
    const a = L.DomUtil.create("a","",d);
    a.href = "#"; a.title = "Cijeli zaslon"; a.innerHTML = "⛶"; a.style.fontSize = "1.05rem";
    L.DomEvent.on(a,"click",(e)=>{
      L.DomEvent.preventDefault(e);
      if (document.fullscreenElement) document.exitFullscreen();
      else document.documentElement.requestFullscreen();
    });
    return d;
  }
});
map.addControl(new FsControl());

const cluster = L.markerClusterGroup({
  maxClusterRadius: 42,
  showCoverageOnHover: false,
  iconCreateFunction(c){
    const n = c.getChildCount();
    const s = n < 10 ? 32 : n < 25 ? 38 : 44;
    return L.divIcon({html:`<div class="cluster-icon">${n}</div>`, className:"", iconSize:[s,s]});
  }
});
map.addLayer(cluster);

/* ---------- markeri ---------- */
function radius(n){ return Math.round(Math.min(24, Math.max(11, 8 + Math.sqrt(n||1) * 3.4))); }

PLACES.forEach(p => {
  p.group = groupOf(p);
  const d = radius(p.broj_zapisa);
  const unv = p.tocnost === "neprovjereno";
  p.marker = L.marker([p.lat, p.lon], {
    icon: L.divIcon({
      className:"", iconSize:[d,d], iconAnchor:[d/2,d/2],
      html:`<div class="pin ${unv?"unverified":""}" style="background:${GROUP_COLOR[p.group]}"></div>`
    }),
    keyboard:false
  })
  .bindTooltip(p.naziv, {className:"place-tip", direction:"top", offset:[0,-d/2-2]})
  .on("click", () => openModal(p));
});

/* ---------- filtriranje ---------- */
function matches(p){
  if (!visibleGroups.has(p.group)) return false;
  if (srcFilter && !p.izvori.includes(srcFilter)) return false;
  if (query && !p.naziv.toLowerCase().includes(query)) return false;
  return true;
}
function refresh(){
  cluster.clearLayers();
  let shown = 0, zapisi = 0;
  PLACES.forEach(p => {
    if (matches(p)){ cluster.addLayer(p.marker); shown++; zapisi += p.broj_zapisa; }
  });
  document.getElementById("stat-line").textContent =
    `prikazano ${shown} od ${PLACES.length} mjesta (${zapisi} zapisa)`;
  renderGroups();
}

/* ---------- panel s grupama ---------- */
const openGroups = new Set();
function renderGroups(){
  const wrap = document.getElementById("groups");
  wrap.innerHTML = "";
  GROUPS.forEach(([name, color], gi) => {
    const items = PLACES
      .filter(p => p.group === name && (!srcFilter || p.izvori.includes(srcFilter)) && (!query || p.naziv.toLowerCase().includes(query)))
      .sort((a,b) => a.naziv.localeCompare(b.naziv, "hr"));
    if (query && items.length === 0) return;

    const g = document.createElement("div");
    g.className = "group" + (openGroups.has(name) || query ? " open" : "");
    g.innerHTML = `
      <div class="group-head">
        <input type="checkbox" id="cb-g${gi}" ${visibleGroups.has(name)?"checked":""} aria-label="Prikaži: ${name}">
        <span class="swatch" style="background:${color}"></span>
        <label class="group-name" for="cb-g${gi}">${name}<span class="group-count">${items.length}</span></label>
        <button class="group-toggle" type="button" aria-label="Otvori popis mjesta">${openGroups.has(name)||query ? "▲" : "▼"}</button>
      </div>
      <ul class="place-list">
        ${items.map(p => `
          <li><a href="#" data-id="${p.id}">
            ${p.naziv}
            ${p.tocnost === "neprovjereno" ? '<span class="u" title="lokacija neprovjerena">≈</span>' : ""}
            <span class="n">${p.broj_zapisa}</span>
          </a></li>`).join("")}
      </ul>`;

    g.querySelector("input").addEventListener("change", e => {
      e.target.checked ? visibleGroups.add(name) : visibleGroups.delete(name);
      refresh();
    });
    g.querySelector(".group-toggle").addEventListener("click", () => {
      openGroups.has(name) ? openGroups.delete(name) : openGroups.add(name);
      g.classList.toggle("open");
      g.querySelector(".group-toggle").textContent = g.classList.contains("open") ? "▲" : "▼";
    });
    g.querySelectorAll("a[data-id]").forEach(a => {
      a.addEventListener("click", e => {
        e.preventDefault();
        const p = PLACES.find(x => x.id === a.dataset.id);
        if (!p) return;
        if (!visibleGroups.has(p.group)){ visibleGroups.add(p.group); refresh(); }
        map.setView([p.lat, p.lon], 13);
        setTimeout(() => openModal(p), 350);
      });
    });
    wrap.appendChild(g);
  });
  if (!wrap.children.length)
    wrap.innerHTML = '<div class="empty-note">Nema mjesta za zadani upit. Pokušaj s drugim nazivom.</div>';
}

/* ---------- modal ---------- */
const back = document.getElementById("modal-back");
function openModal(p){
  document.getElementById("modal-title").textContent = p.naziv;
  document.getElementById("modal-sub").textContent =
    [p.otok, p.regija].filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i).join(" · ");
  const body = document.getElementById("modal-body");
  body.innerHTML = `
    <div class="badges">${p.izvori.map(s => `<span class="badge">${s}</span>`).join("")}</div>
    ${p.tocnost === "neprovjereno" ? `<div class="warn-box">Položaj na karti je neprovjeren — identifikacija mjesta ili koordinate zahtijevaju ručnu provjeru.</div>` : ""}
    ${p.napomena ? `<p class="note">${p.napomena}</p>` : ""}
    <p class="zapisi-t">Zapisi (${p.broj_zapisa})</p>
    <ul class="zapisi">
      ${p.zapisi.map(z => `
        <li>
          <span class="lbl"><span class="src">${z.izvor}</span>: ${z.oznaka}${z.meta ? `<span class="meta">${z.meta}</span>` : ""}</span>
          ${z.url ? `<a class="listen" href="${z.url}" target="_blank" rel="noopener" title="Otvori snimke u fonoteci Staroslavenskoga instituta">&#9658; poslušaj</a>` : ""}
        </li>`).join("")}
    </ul>
    <p class="modal-foot-note">Zvučni zapisi: fonoteka Staroslavenskoga instituta (stin.hr). Poveznica vodi na stranicu albuma — pronađi oznaku CD-a i pokreni player.</p>`;
  back.classList.add("show");
  back.setAttribute("aria-hidden","false");
  document.getElementById("modal-close").focus();
}
function closeModal(){ back.classList.remove("show"); back.setAttribute("aria-hidden","true"); }
document.getElementById("modal-close").addEventListener("click", closeModal);
back.addEventListener("click", e => { if (e.target === back) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

/* ---------- kontrole ---------- */
document.getElementById("src-select").addEventListener("change", e => { srcFilter = e.target.value; refresh(); });
document.getElementById("search").addEventListener("input", e => { query = e.target.value.trim().toLowerCase(); refresh(); });
document.getElementById("all-on").addEventListener("click", () => { GROUPS.forEach(g => visibleGroups.add(g[0])); refresh(); });
document.getElementById("all-off").addEventListener("click", () => { visibleGroups.clear(); refresh(); });

const fh = document.getElementById("filters-head");
function toggleFilters(){
  const f = document.getElementById("filters");
  f.classList.toggle("closed");
  fh.setAttribute("aria-expanded", String(!f.classList.contains("closed")));
}
fh.addEventListener("click", toggleFilters);
fh.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " "){ e.preventDefault(); toggleFilters(); } });
if (window.innerWidth < 680) document.getElementById("filters").classList.add("closed");

refresh();
</script>
</body>
</html>
